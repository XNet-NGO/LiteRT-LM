name: "Build & Release .so"

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-x64:
    name: "Linux x86_64"
    runs-on: ubuntu-22.04
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -yq \
            build-essential gcc clang cmake make pkg-config \
            openjdk-17-jdk-headless git wget curl unzip \
            tar python3 python3-dev python3-pip git-lfs \
            python3-numpy ccache zlib1g-dev libssl-dev \
            libpng-dev libcurl4-openssl-dev libfftw3-dev \
            golang-go npm patchelf && \
          git lfs install

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Bazelisk
        run: sudo npm install -g @bazel/bazelisk

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Restore Bazel Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-linux-x64-${{ hashFiles('**/WORKSPACE', '**/.bazelrc', '**/BUILD*') }}-${{ github.sha }}
          restore-keys: |
            bazel-linux-x64-${{ hashFiles('**/WORKSPACE', '**/.bazelrc', '**/BUILD*') }}-
            bazel-linux-x64-

      - name: Build .so Libraries
        run: |
          bazelisk build --disk_cache=~/.cache/bazel --config=linux_x86_64 \
            --deleted_packages=swift \
            --define=litert_link_capi_so=true \
            --define=resolve_symbols_in_exec=false \
            -c opt \
            //runtime/engine:litert_lm_main \
            //runtime/...

      - name: Collect Artifacts
        run: |
          mkdir -p artifacts
          find bazel-bin/ -name "*.so" -exec cp {} artifacts/ \;
          cp bazel-bin/runtime/engine/litert_lm_main artifacts/litert_lm_main.linux_x86_64 || true
          ls -lh artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: so-linux-x64
          path: artifacts/

  build-linux-arm64:
    name: "Linux arm64"
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -yq \
            build-essential gcc clang cmake make pkg-config \
            openjdk-17-jdk-headless git wget curl unzip \
            tar python3 python3-dev python3-pip git-lfs \
            python3-numpy ccache zlib1g-dev libssl-dev \
            libpng-dev libcurl4-openssl-dev libfftw3-dev \
            golang-go npm patchelf && \
          git lfs install

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Bazelisk
        run: sudo npm install -g @bazel/bazelisk

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Restore Bazel Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-linux-arm64-${{ hashFiles('**/WORKSPACE', '**/.bazelrc', '**/BUILD*') }}-${{ github.sha }}
          restore-keys: |
            bazel-linux-arm64-${{ hashFiles('**/WORKSPACE', '**/.bazelrc', '**/BUILD*') }}-
            bazel-linux-arm64-

      - name: Build .so Libraries
        run: |
          bazelisk build --disk_cache=~/.cache/bazel --config=linux_arm64 \
            --deleted_packages=swift \
            --define=litert_link_capi_so=true \
            --define=resolve_symbols_in_exec=false \
            -c opt \
            //runtime/engine:litert_lm_main \
            //runtime/...

      - name: Collect Artifacts
        run: |
          mkdir -p artifacts
          find bazel-bin/ -name "*.so" -exec cp {} artifacts/ \;
          cp bazel-bin/runtime/engine/litert_lm_main artifacts/litert_lm_main.linux_arm64 || true
          ls -lh artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: so-linux-arm64
          path: artifacts/

  build-android-arm64:
    name: "Android arm64"
    runs-on: ubuntu-22.04
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -yq \
            build-essential gcc clang cmake make pkg-config \
            openjdk-17-jdk-headless git wget curl unzip \
            tar python3 python3-dev python3-pip git-lfs \
            python3-numpy ccache zlib1g-dev libssl-dev \
            libpng-dev libcurl4-openssl-dev libfftw3-dev \
            golang-go npm patchelf && \
          git lfs install

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Bazelisk
        run: sudo npm install -g @bazel/bazelisk

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Setup Android SDK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          export ANDROID_HOME=/opt/android-sdk
          sudo mkdir -p $ANDROID_HOME/cmdline-tools
          wget -qO /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          sudo unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          sudo mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm /tmp/cmdline-tools.zip
          yes | sudo $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" "platforms;android-34" \
            "build-tools;33.0.1" "build-tools;34.0.0" > /dev/null
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28b
          add-to-path: false

      - name: Export NDK Home
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Restore Bazel Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-android-arm64-${{ hashFiles('**/WORKSPACE', '**/.bazelrc', '**/BUILD*') }}-${{ github.sha }}
          restore-keys: |
            bazel-android-arm64-${{ hashFiles('**/WORKSPACE', '**/.bazelrc', '**/BUILD*') }}-
            bazel-android-arm64-

      - name: Build .so Libraries
        run: |
          bazelisk build --disk_cache=~/.cache/bazel --config=android_arm64 \
            --deleted_packages=swift \
            -c opt \
            //runtime/engine:litert_lm_main \
            @litert//litert/vendors/mediatek/dispatch:dispatch_api_so \
            @litert//litert/vendors/qualcomm/dispatch:dispatch_api_so \
            -- \
            -//python/... \
            -//kotlin/java/com/google/ai/edge/litertlm/example/...

      - name: Collect Artifacts
        run: |
          mkdir -p artifacts
          find bazel-bin/ -name "*.so" -exec cp {} artifacts/ \;
          cp bazel-bin/runtime/engine/litert_lm_main artifacts/litert_lm_main.android_arm64 || true
          ls -lh artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: so-android-arm64
          path: artifacts/

  release:
    name: "Create Release"
    needs: [build-linux-x64, build-linux-arm64, build-android-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Package Archives
        run: |
          cd release-artifacts
          tar -czf litert-lm-linux-x86_64.tar.gz -C so-linux-x64 .
          tar -czf litert-lm-linux-arm64.tar.gz -C so-linux-arm64 .
          tar -czf litert-lm-android-arm64.tar.gz -C so-android-arm64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/litert-lm-linux-x86_64.tar.gz
            release-artifacts/litert-lm-linux-arm64.tar.gz
            release-artifacts/litert-lm-android-arm64.tar.gz
